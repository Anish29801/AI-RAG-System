name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  PYTHONPATH: ${{ github.workspace }}

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Install system deps (PyMuPDF)
        run: sudo apt-get update && sudo apt-get install -y mupdf-tools

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            requirements-dev.txt

      - name: Install project deps
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Install test deps
        run: |
          pip install pytest pytest-asyncio hypothesis pytest-md pytest-emoji

      - name: Run tests (Foundation, Pipeline, LLM unit, Property)
        run: |
          python -m pytest \
            tests/test_foundation.py \
            tests/test_pipeline.py \
            tests/test_property.py \
            tests/test_llm.py \
            -m "not integration" \
            -v \
            --tb=short \
            --junitxml=test-results.xml \
            -q

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.python-version }}
          path: test-results.xml
